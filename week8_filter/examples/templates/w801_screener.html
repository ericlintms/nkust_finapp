<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>{{ app_title }}</title>
    <!-- 引入 Bootstrap 美化版面 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🔎 {{ app_title }}</span>
        </div>
    </nav>

    <div class="container pb-5">

        <!-- ============================================== -->
        <!-- 區塊 1：這就是本週的核心武器 - 篩選控制面板 (Form) -->
        <!-- ============================================== -->
        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body p-4">
                <h5 class="card-title text-primary mb-3">設定您的篩選條件</h5>

                <!-- action="/" 表示這包資料要傳回給同一個網址 (也就是我們的 fastapi) -->
                <form action="/" method="GET" class="row gx-3 gy-2 align-items-end">

                    <div class="col-sm-4">
                        <label class="form-label text-muted">限制最高股價 (Price)：</label>
                        <!-- 發現 value 裡面有 Jinja2 了嗎？這是為了記住我們剛剛按鈕送出過的數字！-->
                        <input type="number" step="0.1" name="max_price" class="form-control" placeholder="留白表示不限制"
                            value="{{ saved_max_price }}">
                    </div>

                    <div class="col-sm-4">
                        <label class="form-label text-muted">限制最高本益比 (P/E)：</label>
                        <input type="number" step="0.1" name="max_pe" class="form-control" placeholder="留白表示不限制"
                            value="{{ saved_max_pe }}">
                    </div>

                    <div class="col-sm-4">
                        <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                            🚀 光速篩選
                        </button>
                    </div>

                    <!-- 加一個可以清除條件的按鈕 (其實就是回到乾淨的根目錄首頁啦) -->
                    <div class="col-12 mt-3 text-end">
                        <a href="/" class="text-decoration-none text-danger small">✖ 清除所有篩選條件</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊 2：動態結果顯示區塊 (沿用上週的表格概念) -->
        <!-- ============================================== -->
        <h4 class="mb-3">篩選結果 <span class="badge bg-secondary rounded-pill">找到 {{ result_count }} 檔</span></h4>

        <!-- 當我們把門檻設很高，導致半檔股票都找不到的時候，我們要印個東西提醒使用者 (又叫做 防呆) -->
        {% if result_count == 0 %}
        <div class="alert alert-warning text-center" role="alert">
            😥 抱歉，這世界上沒有股票能通過您如此嚴苛的考驗！請放寬一點條件再試一次吧。
        </div>
        {% else %}
        <!-- 如果有找到，就印出漂亮的表格！ -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>代號</th>
                            <th>名稱</th>
                            <th class="text-end">目前價格</th>
                            <th class="text-end">本益比(PE)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for stock in stocks %}
                        <tr>
                            <td><strong>{{ stock.ticker }}</strong></td>
                            <td>{{ stock.name }}</td>
                            <!-- align 靠右讓數字比較好讀齊平 -->
                            <td class="text-end text-success fw-bold">${{ stock.price }}</td>
                            <td class="text-end">{{ stock.pe }} 倍</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        {% endif %}

    </div>
</body>

</html>
